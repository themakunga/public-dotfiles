name: CI & Auto PR to Main

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  security-and-lint:
    name: Security & Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check Commit Messages (Commitlint)
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: ".commitlintrc.yaml"

      - name: Check for Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Leftover System Files
        run: |
          BAD_FILES=$(find . -name ".DS_Store" -o -name "Thumbs.db" -o -name "*.env" -o -name "*.pem" -o -name "*.key" | grep -v "node_modules" || true)
          if [ -n "$BAD_FILES" ]; then
            echo "ERROR: Archivos prohibidos detectados en el repositorio:"
            echo "$BAD_FILES"
            exit 1
          fi

  create-pr:
    name: Create PR to Main
    needs: security-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Create and Assign Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "develop"
          destination_branch: "main"
          pr_title: "Release: Merge develop into main"
          pr_body: "Automated PR generated by CI after successful security, linting, and validation checks."
          pr_reviewer: "themakunga"
          pr_assignee: "themakunga"
          github_token: ${{ secrets.GH_PAT }}
