repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        stages: [pre-push]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        stages: [pre-commit]
        additional_dependencies: ["prettier@3.2.5"]
        files: '\.(md|yaml|yml|json)$'

  - repo: local
    hooks:
      - id: forbidden-files
        name: Prevenir archivos del sistema y entornos
        entry: bash -c '! git diff --cached --name-only | grep -E "(\.DS_Store|Thumbs\.db|\.env)$"'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: stylua
        name: StyLua Format
        entry: stylua
        language: system
        files: '\.lua$'
        stages: [pre-commit]
