repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8 # Mantiene a Prettier oficial corrigiendo y re-stageando solo
    hooks:
      - id: prettier
        additional_dependencies: ["prettier@3.2.5"] # Puedes fijar la versión que gustes
        files: '\.(md|yaml|yml|json)$'

  - repo: local
    hooks:
      - id: forbidden-files
        name: Prevenir archivos del sistema y entornos
        entry: bash -c '! git diff --cached --name-only | grep -E "(\.DS_Store|Thumbs\.db|\.env)$"'
        language: system
        always_run: true
        pass_filenames: false

      - id: stylua
        name: StyLua Format
        entry: stylua
        language: system
        files: '\.lua$'
